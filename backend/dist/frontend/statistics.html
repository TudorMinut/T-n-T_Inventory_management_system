<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Statistici si Gestiunea Datelor</title>
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/statistics.css">
</head>

<body>
    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo-section">
                <h1>Statistici și Gestiunea Datelor</h1>
                <p>Rapoarte și analize detaliate</p>
            </div>
            <nav class="header-nav">
                <button onclick="window.location.href='/dashboard.html'" class="btn-primary">Dashboard</button>
                <button id="logoutBtn" class="btn-danger">Deconectare</button>
            </nav>
        </div>
    </header>

    <!-- Conținut Principal -->
    <main class="main-content">
        <h1>Statistici si Gestiunea Datelor</h1>
        <div class="section">
            <h2>Statistici</h2>
            <div class="button-group">
                <button onclick="window.open('/api/statistics/html','_blank')">Vezi Statistici HTML</button>
                <button onclick="window.open('/api/statistics/pdf','_blank')">Descarca Statistici PDF</button>
            </div>
        </div>
        <div class="section">
            <h2>Export Date</h2>
            <div class="button-group">
                <button onclick="window.location.href='/api/data/export/csv'">Export CSV</button>
                <button onclick="window.location.href='/api/data/export/json'">Export JSON</button>
                <button onclick="window.location.href='/api/data/export/xml'">Export XML</button>
            </div>
        </div>
        <div class="section">
            <h2>Import Date</h2>
            <form id="importCsvForm" class="import-form">
                <h3>Import CSV</h3>
                <label>Selecteaza fisier CSV: <input type="file" id="csvFile" accept=".csv" required></label>
                <button type="submit">Importa CSV</button>
            </form>
            <form id="importJsonForm" class="import-form">
                <h3>Import JSON</h3>
                <label>Selecteaza fisier JSON: <input type="file" id="jsonFile" accept=".json" required></label>
                <button type="submit">Importa JSON</button>
            </form>
            <form id="importXmlForm" class="import-form">
                <h3>Import XML</h3>
                <label>Selecteaza fisier XML: <input type="file" id="xmlFile" accept=".xml" required></label>
                <button type="submit">Importa XML</button>
            </form>
        </div>
        <div id="feedback" class="feedback"></div>

    </main>

    <script src="/public/statistics.js"></script>
</body>

</html>
