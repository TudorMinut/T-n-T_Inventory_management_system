<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Gestionare Articole și Consumabile</title>
</head>

<body>
    <h1>Înregistrare</h1>
    <form id="registerForm">
        <label>Utilizator: <input type="text" id="regUsername" required></label><br>
        <label>Email: <input type="email" id="regEmail" required></label><br>
        <label>Parolă: <input type="password" id="regPassword" required></label><br>
        <button type="submit">Înregistrare</button>
    </form>

    <h1>Autentificare</h1>
    <form id="loginForm">
        <label>Email: <input type="email" id="loginEmail" required></label><br>
        <label>Parolă: <input type="password" id="loginPassword" required></label><br>
        <button type="submit">Autentificare</button>
    </form>

    <hr>

    <h1>Gestionare Categorii</h1>
    <form id="categoryForm">
        <label>Denumire categorie: <input type="text" id="categoryName" required></label><br>
        <button type="submit">Adaugă categorie</button>
    </form>
    <h2>Lista categorii</h2>
    <ul id="categoriesList"></ul>

    <hr>

    <h1>Gestionare Articole și Consumabile</h1>
    <form id="itemForm">
        <label>Denumire articol: <input type="text" id="itemName" required></label><br>
        <label>Categorie:
            <select id="itemCategory" required>
                <!-- Categoriile vor fi încărcate aici -->
            </select>
        </label><br>
        <button type="submit">Adaugă articol</button>
    </form>
    <h2>Lista articole</h2>
    <ul id="itemsList"></ul>
    <script>
        // Script pentru înregistrare și autentificare
        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            await fetch('http://localhost:3000/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            document.getElementById('registerForm').reset();
        };

        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            await fetch('http://localhost:3000/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            document.getElementById('loginForm').reset();
        };

        // Script pentru categorii
        async function fetchCategories() {
            const res = await fetch('http://localhost:3000/categories');
            const categories = await res.json();
            const list = document.getElementById('categoriesList');
            const select = document.getElementById('itemCategory');
            list.innerHTML = '';
            select.innerHTML = '';
            categories.forEach(category => {
                const li = document.createElement('li');
                li.textContent = `${category.id}: ${category.name}`;
                list.appendChild(li);

                const option = document.createElement('option');
                option.value = category.name;
                option.textContent = category.name;
                select.appendChild(option);
            });
        }

        document.getElementById('categoryForm').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('categoryName').value;
            await fetch('http://localhost:3000/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            document.getElementById('categoryForm').reset();
            fetchCategories();
        };

        // Script pentru articole
        async function fetchItems() {
            const res = await fetch('http://localhost:3000/items');
            const items = await res.json();
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.id}: ${item.name} (Categorie: ${item.category}) `;

                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Șterge';
                deleteButton.onclick = async () => {
                    await fetch(`http://localhost:3000/items/${item.id}`, { method: 'DELETE' });
                    fetchItems();
                };
                li.appendChild(deleteButton);

                list.appendChild(li);
            });
        }

        document.getElementById('itemForm').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCategory').value;
            await fetch('http://localhost:3000/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, category })
            });
            document.getElementById('itemForm').reset();
            fetchItems();
        };

        // Inițializare
        fetchCategories();
        fetchItems();
    </script>
</body>

</html>
