<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Gestionare Articole și Consumabile</title>
</head>

<body>
    <h1>Înregistrare</h1>
    <form id="registerForm">
        <label>Utilizator: <input type="text" id="regUsername" required></label><br>
        <label>Email: <input type="email" id="regEmail" required></label><br>
        <label>Parolă: <input type="password" id="regPassword" required></label><br>
        <button type="submit">Înregistrare</button>
    </form>

    <h1>Autentificare</h1>
    <form id="loginForm">
        <label>Email: <input type="email" id="loginEmail" required></label><br>
        <label>Parolă: <input type="password" id="loginPassword" required></label><br>
        <button type="submit">Autentificare</button>
    </form>

    <hr>

    <h1>Gestionare Articole și Consumabile</h1>
    <form id="itemForm">
        <label>Denumire articol: <input type="text" id="itemName" required></label><br>
        <label>Categorie: <input type="text" id="itemCategory" required></label><br>
        <button type="submit">Adaugă articol</button>
    </form>
    <h2>Lista articole</h2>
    <ul id="itemsList"></ul>
    <script>
        // Script pentru înregistrare și autentificare
        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('http://localhost:3000/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const result = await res.json();
            alert(result.message || `Utilizator ${result.username} înregistrat!`);
            document.getElementById('registerForm').reset();
        };

        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('http://localhost:3000/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await res.json();
            alert(result.message);
            if (res.ok) {
                // Aici se poate salva un token sau seta o stare de autentificare
            }
            document.getElementById('loginForm').reset();
        };


        // Script existent pentru articole
        async function fetchItems() {
            const res = await fetch('http://localhost:3000/items');
            const items = await res.json();
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.id}: ${item.name} (Categorie: ${item.category})`;
                list.appendChild(li);
            });
        }
        document.getElementById('itemForm').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCategory').value;
            await fetch('http://localhost:3000/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, category })
            });
            document.getElementById('itemForm').reset();
            fetchItems();
        };
        fetchItems();
    </script>
</body>

</html>
