<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Autentificare / Înregistrare</title>
    <link rel="stylesheet" href="/public/style.css">
</head>

<body>
    <h1>Autentificare</h1>
    <form id="loginForm">
        <label>Email: <input type="email" id="loginEmail" required></label><br>
        <label>Parolă: <input type="password" id="loginPassword" required></label><br>
        <button type="submit">Autentificare</button>
    </form>
    <hr>
    <h1>Înregistrare</h1>
    <form id="registerForm">
        <label>Utilizator: <input type="text" id="regUsername" required></label><br>
        <label>Email: <input type="email" id="regEmail" required></label><br>
        <label>Parolă: <input type="password" id="regPassword" required></label><br>
        <button type="submit">Înregistrare</button>
    </form>
    <script>
        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const result = await res.json();
            alert(result.message || `Utilizator ${result.username} înregistrat!`);
            document.getElementById('registerForm').reset();
        };
        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await res.json();
            if (res.ok) {
                localStorage.setItem('userId', result.userId);
                window.location.href = '/dashboard.html';
            } else {
                alert(result.message);
            }
            document.getElementById('loginForm').reset();
        };
        if (localStorage.getItem('userId')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>

</html>
