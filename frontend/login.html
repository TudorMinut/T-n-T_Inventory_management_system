<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Autentificare / Inregistrare</title>
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/login.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-compact">
            <h1>Autentificare</h1>
            <form id="loginForm">
                <label>Email: <input type="email" id="loginEmail" required></label>
                <label>Parola: <input type="password" id="loginPassword" required></label>
                <button type="submit">Autentificare</button>
            </form>
            <hr>
            <h2>Inregistrare</h2>
            <form id="registerForm">
                <label>Utilizator: <input type="text" id="regUsername" required></label>
                <label>Email: <input type="email" id="regEmail" required></label>
                <label>Parola: <input type="password" id="regPassword" required></label>
                <button type="submit">Inregistrare</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const result = await res.json();
            alert(result.message || `Utilizator ${result.username} inregistrat!`);
            document.getElementById('registerForm').reset();
        };
        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await res.json();
            if (res.ok) {
                localStorage.setItem('userId', result.userId);
                window.location.href = '/dashboard.html';
            } else {
                alert(result.message);
            }
            document.getElementById('loginForm').reset();
        };
        if (localStorage.getItem('userId')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>

</html>
